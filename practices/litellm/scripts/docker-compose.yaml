services:
  # ============================================
  # LiteLLM Proxy — LLM 统一网关
  # ============================================
  litellm:
    image: swr.cn-north-4.myhuaweicloud.com/sac/litellm-image/litellm-database:main-stable
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "4000:4000/tcp"
    command:
      - "--config=/app/config.yaml"
    environment:
      DATABASE_URL: "postgresql://llmproxy:${POSTGRES_PASSWORD}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PostgreSQL — 核心数据库
  # ============================================
  db:
    image: swr.cn-north-4.myhuaweicloud.com/sac/litellm-image/postgres:16
    container_name: litellm-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # Prometheus — 指标监控（可选）
  # ============================================
  prometheus:
    image: swr.cn-north-4.myhuaweicloud.com/sac/litellm-image/prometheus:v2.53.0
    container_name: litellm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090/tcp"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus/data:/prometheus
    depends_on:
      - litellm
