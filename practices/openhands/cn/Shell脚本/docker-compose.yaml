# ================================================
# OpenHands — Docker Compose 部署配置
# 基于官方 docker.openhands.dev 镜像
#
# 使用前:
#   方式A: 直接拉取官方镜像（需要访问 docker.openhands.dev）
#   docker compose up -d
#
#   方式B: 推送到 SWR 后部署（推荐国内 ECS）
#   1. 在有外网权限的机器上:
#      docker pull docker.openhands.dev/openhands/openhands:latest
#      docker tag docker.openhands.dev/openhands/openhands:latest \
#        swr.cn-north-4.myhuaweicloud.com/{命名空间}/openhands:latest
#      docker push swr.cn-north-4.myhuaweicloud.com/{命名空间}/openhands:latest
#
#   2. 修改下方 image 地址为 SWR 地址
#   3. docker compose up -d
# ================================================

services:
  openhands:
    # 官方镜像地址（或替换为 SWR 镜像）
    image: docker.openhands.dev/openhands/openhands:latest
    container_name: openhands
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"
    environment:
      # Agent Server 配置
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.19.1-python
      # 日志
      - LOG_ALL_EVENTS=true
      # 时区
      - TZ=Asia/Shanghai
    volumes:
      # Docker-in-Docker（让容器内 Agent 能调用 Docker）
      - /var/run/docker.sock:/var/run/docker.sock
      # 配置持久化
      - /opt/openhands/config:/.openhands
      # 工作目录
      - /opt/openhands/workspace:/workspace
      # 时区
      - /etc/localtime:/etc/localtime:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
