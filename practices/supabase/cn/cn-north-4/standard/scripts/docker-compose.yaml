services:
  # ============================================
  # Kong — API 网关（统一入口）
  # ============================================
  kong:
    image: docker.wangzhou3.top/sac/supabase-image/kong:3.9.1
    container_name: supabase-kong
    restart: unless-stopped
    ports:
      - "8000:8000/tcp"
      - "8443:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/temp.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,rate-limiting
      KONG_NGINX_WORKER_PROCESSES: "2"
      KONG_LOG_LEVEL: warn
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # PostgreSQL — 核心数据库（含 Supabase 扩展）
  # ============================================
  db:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-postgres:15.8.1.085
    container_name: supabase-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # Supavisor — 连接池
  # ============================================
  supavisor:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-supavisor:2.7.4
    container_name: supabase-pooler
    restart: unless-stopped
    ports:
      - "6543:6543"
      - "5433:5433"
    environment:
      PROJECT_NAME: supabase
      DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/supabase
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MaxPoolSize: "30"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: pg_isready -h localhost -p 6543 -U supabase_admin
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # GoTrue — 认证服务
  # ============================================
  auth:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-gotrue:v2.186.0
    container_name: supabase-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/supabase
      DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/supabase
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: curl -sS http://localhost:9999/health
      interval: 30s
      timeout: 5s
      retries: 5

  # ============================================
  # PostgREST — REST API
  # ============================================
  rest:
    image: docker.wangzhou3.top/sac/supabase-image/postgrest-postgrest:v14.8
    container_name: supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/supabase
      PGRST_DB_SCHEMA: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_AGGREGATES_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Realtime — WebSocket 实时订阅
  # ============================================
  realtime:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-realtime:v2.76.5
    container_name: supabase-realtime
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: supabase
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      APP_NAME: ${APP_NAME}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      REPLICATION_MODE: "stream"
      REPLICATION_SLOT_NAME: "supabase_realtime_replication_slot"
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Storage API — 文件存储
  # ============================================
  storage:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-storage-api:v1.48.26
    container_name: supabase-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      IMGPROXY_URL: http://imgproxy:5001
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/supabase
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      FILE_STORAGE_PATH: /var/lib/storage
      TENANT_ID: default
      REGION: cn-north-4
      GLOBAL_S3_BUCKET: ""
    volumes:
      - ./volumes/storage:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  # ============================================
  # imgproxy — 图片处理（Storage 依赖）
  # ============================================
  imgproxy:
    image: docker.wangzhou3.top/sac/supabase-image/darthsim-imgproxy:latest
    container_name: supabase-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"

  # ============================================
  # postgres-meta — 数据库管理 API
  # ============================================
  meta:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-postgres-meta:v0.96.3
    container_name: supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: supabase
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_PG_META_CRYPTO_KEY: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ============================================
  # Studio — Web 管理面板
  # ============================================
  studio:
    image: docker.wangzhou3.top/sac/supabase-image/supabase-studio:latest
    container_name: supabase-studio
    restart: unless-stopped
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_PUBLIC_URL: http://localhost:8000
    depends_on:
      - meta
      - kong
