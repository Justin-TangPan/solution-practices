_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth:9999
    routes:
      - name: auth-all
        paths:
          - /auth/v1/
    plugins:
      - name: cors
  - name: rest-service
    url: http://rest:3000
    routes:
      - name: rest-all
        paths:
          - /rest/v1/
    plugins:
      - name: cors
  - name: realtime-service
    url: http://realtime:4000
    routes:
      - name: realtime-all
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
  - name: storage-service
    url: http://storage:5000
    routes:
      - name: storage-all
        paths:
          - /storage/v1/
    plugins:
      - name: cors
  - name: meta-service
    url: http://meta:8080
    routes:
      - name: meta-all
        paths:
          - /pg/
  - name: studio-service
    url: http://studio:3000
    routes:
      - name: studio-all
        paths:
          - /
