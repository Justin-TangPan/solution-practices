name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install repository dependencies
        run: npm ci
      - name: Test repository
        run: npm test
      - name: Inspect npm package
        run: npm run pack:check
      - name: Run SAC quality gate
        run: python -m scripts.tests.runner
      - name: Verify Web
        run: |
          npm ci --prefix web
          npm run lint --prefix web
          npm run build --prefix web

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --latest
